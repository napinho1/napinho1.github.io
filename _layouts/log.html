---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <p class="meta">
    {{ page.date | date: "%d.%m.%y" }}
  </p>

  <div class="content">
    {{ content }}
  </div>

  {% if page.tags %}
    <hr>
    <p class="tags">
      tags:
      {% for tag in page.tags %}
        <a href="/mapa.html#{{ tag | slugify }}">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
      {% endfor %}
    </p>
  {% endif %}
</article>
