---
layout: default
title: Fluxo
---

<section class="logs">
  {% if site.posts.size > 0 %}
    {% for post in site.posts %}
      <article class="log-entry">
        <a href="{{ post.url }}">{{ post.date | date: "%d.%m.%y" }} — {{ post.title }}</a>
      </article>
    {% endfor %}
  {% else %}
    <p class="empty-state">
      &gt; nenhum log encontrado<br>
      &gt; aguardando entrada
    </p>
  {% endif %}
</section>
